    const TEAM = ['Hrotkó Máté', 'Litavecz Máté'];

    function render(data) {
      const container = document.getElementById('milestones-container');
      container.innerHTML = META.map(m => {
        const pts = data.milestones[m.id].points;
        const pct = Math.round(pts / m.max * 100);

        const tasksHtml = m.tasks.map(t => `
          <div class="task-item">
            <div class="task-dot" style="background:${t.done ? m.color : 'var(--border)'};"></div>
            <span class="${t.done ? 'text-active' : 'text-muted'}">${t.label}</span>
            ${t.done ? `<span class="task-check" style="color:${m.color};">✓ kész</span>` : ''}
          </div>`).join('');

        const contentHtml = m.content.map(c => `
          <div class="content-block">
            <h3>${c.icon} ${c.title} ${c.wip ? '<span class="wip-badge">WIP</span>' : ''}</h3>
            ${c.html}
          </div>`).join('');

        const teamHtml = TEAM.map(name => {
          const note = (data.team[name] && data.team[name][m.id]) || '';
          return `
          <div class="member-card">
            <div class="member-name">👤 ${name}</div>
            <div class="section-label">Hozzájárulás</div>
            <p class="member-contribution">${note || 'Nincs bejegyezve.'}</p>
          </div>`;
        }).join('');

        return `
        <div class="milestone-block fade-in">
          <div class="milestone-block-header">
            <span class="m-pill ${m.pill}">${m.label}</span>
            <span class="milestone-title">${m.title}</span>
            <span class="deadline-badge">📅 ${m.deadlineLabel}</span>
            <div class="pts-big" style="color:${m.color};">${pts}<span>/${m.max}</span></div>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%; background:${m.color};"></div></div>
          <p class="page-sub">${m.description}</p>
          <div class="section-label">// Feladatok</div>
          <div class="content-block">${tasksHtml}</div>
          <div class="section-label">// Tartalom</div>
          ${contentHtml}
          <div class="section-label">// Csapattagok</div>
          <div class="grid-4">${teamHtml}</div>
          <div class="divider"></div>
        </div>`;
      }).join('');

      let total = 0;
      META.forEach(m => { total += data.milestones[m.id].points; });
      document.getElementById('nav-score').textContent = `${total}/30 pt`;
    }

    async function init() {
      try {
        const data = await loadData();
        render(data);
      } catch (e) {
        document.getElementById('milestones-container').innerHTML = `<div class="card">Hiba a betöltéskor.</div>`;
      }
    }
    init();
  </script>
</body>
