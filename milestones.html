<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parkoló Detektálás - Mérföldkövek</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .milestone-block { margin-bottom: 48px; }

  .milestone-block-header {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding-bottom: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .deadline-badge {
    font-family: 'Space Mono', monospace;
    font-size: .7rem;
    color: var(--muted);
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 99px;
  }

  .pts-big {
    font-family: 'Space Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1;
    margin-left: auto;
  }
</style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="index.html">🅿 PARKING</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Főoldal</a>
    <a class="nav-link" href="milestones.html">Mérföldkövek</a>
  </div>
  <div class="nav-status">
    <span class="nav-dot"></span>
    <span id="nav-score">- / 30 pt</span>
  </div>
</nav>

<div class="page">

  <div class="fade-in" style="border-left:4px solid var(--accent2); padding-left:20px; margin-bottom:40px;">
    <div class="page-label">// Projekt haladás</div>
    <h1 class="page-title">Mérföld<span>kövek</span></h1>
    <p class="page-sub">Feladatok, tartalom és csapattagok hozzájárulásai mérföldkövenként.<br>
    Az adatok frissítéséhez szerkeszd a <code style="color:var(--accent);">data.json</code> fájlt a repóban.</p>
  </div>

  <div id="milestones-container"></div>

  <div class="hint">// szerkesztés: data.json módosítása → push → ~30mp múlva élő</div>
</div>

<script src="js/shared.js"></script>
<script>
const META = [
  {
    id: 'm1', label: '1. Mérföldkő', title: 'Tervezés & Dokumentáció',
    max: 5, color: 'var(--m1)', pill: 'm1-pill',
    deadline: '2026-03-01', deadlineLabel: '2026. márc. 1. 23:59',
    description: 'Egy PDF dokumentumban kell leadni az algoritmus tervet szakirodalom alapján és a költségbecslést. Egy weboldalon nyilván kell tartani a projekt haladását. Fel kell jegyezni, hogy melyik csapattag mit csinált.',
    tasks: [
      { label: 'PDF dokumentum: algoritmus terv + költségbecslés', done: true },
      { label: 'Weboldal a projekt haladásának nyilvántartásához', done: true },
      { label: 'Csapattagok hozzájárulásainak dokumentálása', done: true },
    ],
    content: [
      {
        icon: '📐', title: 'Algoritmus Terv', wip: true,
        html: `<p style="color:var(--muted); font-size:.88rem; line-height:1.8;">
          Ez a tartalom még egyeztetés alatt áll. A végleges algoritmus terv
          ide kerül majd a szakirodalmi hivatkozásokkal és architektúra vázlattal.
        </p>`
      },
      {
        icon: '📚', title: 'Képi adatbázisok (Dataset források)', wip: true,
        html: `<p style="color:var(--muted); font-size:.88rem; line-height:1.8;">
          Ez a tartalom még egyeztetés alatt áll. A tervezett adatbázis-forrásokhoz
          linkek és rövid leírások kerülnek ide.
        </p>`
      },
      {
        icon: '💰', title: 'Költségbecslés (Hardware + Szoftver)', wip: false,
        html: `
        <div style="margin-bottom:18px;">
          <div style="font-family:'Space Mono',monospace; font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px;">Hardware eszközök</div>
          <table class="cost-table">
            <tr><th>Eszköz</th><th>Típus / Leírás</th><th>Becsült ár</th></tr>
            <tr><td><strong>IP Kamera</strong></td><td>Reolink RLC-810A (4K, AI ember/autó detektálás, éjjellátó)</td><td>~45 000 Ft</td></tr>
            <tr><td><strong>Kamera tartó/konzol</strong></td><td>Kültéri oszloptartó</td><td>~8 000 Ft</td></tr>
            <tr><td><strong>Számítási egység</strong></td><td>NVIDIA Jetson Orin Nano (Edge AI-ra optimalizált)</td><td>~220 000 Ft</td></tr>
            <tr><td><strong>Hálózati eszközök</strong></td><td>PoE Switch + CAT6 kábelezés (20m)</td><td>~25 000 Ft</td></tr>
            <tr class="total-row"><td colspan="2"><strong>Hardware összesen</strong></td><td>~298 000 Ft</td></tr>
          </table>
        </div>
        <div>
          <div style="font-family:'Space Mono',monospace; font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px;">Szoftver és infrastruktúra</div>
          <table class="cost-table">
            <tr><th>Elem</th><th>Leírás</th><th>Költség</th></tr>
            <tr><td><strong>Fejlesztői környezet</strong></td><td>Python, OpenCV, PyTorch / TensorFlow</td><td>Ingyenes</td></tr>
            <tr><td><strong>Adattárolás / Cloud</strong></td><td>Google Colab Pro (tanításhoz)</td><td>~4 000 Ft/hó</td></tr>
            <tr><td><strong>Weboldal hosting</strong></td><td>GitHub Pages</td><td>Ingyenes</td></tr>
          </table>
        </div>`
      }
    ]
  },
  {
    id: 'm2', label: '2. Mérföldkő', title: 'Algoritmus Implementálása',
    max: 10, color: 'var(--m2)', pill: 'm2-pill',
    deadline: '2026-04-12', deadlineLabel: '2026. ápr. 12. 23:59',
    description: 'Egy PDF dokumentumba (az 1. mérföldkő folytatásaként) le kell írni a kezdeti algoritmust és az első eredményeket. A honlapon frissíteni kell az eredményeket, a mérföldkövek eredményeit külön kell bemutatni.',
    tasks: [
      { label: 'PDF: kezdeti algoritmus leírása + első eredmények', done: false },
      { label: 'Weboldal frissítése az eredményekkel', done: false },
      { label: 'Mérföldkövek eredményei elkülönítve bemutatva', done: false },
    ],
    content: [
      {
        icon: '🔜', title: 'Tartalom hamarosan', wip: true,
        html: `<p style="color:var(--muted); font-size:.88rem; line-height:1.8;">
          A 2. mérföldkő tartalma — algoritmus implementáció és első eredmények —
          2026. április 12. előtt kerül ide.
        </p>`
      }
    ]
  },
  {
    id: 'm3', label: '3. Mérföldkő', title: 'Bemutató & Védés',
    max: 15, color: 'var(--m3)', pill: 'm3-pill',
    deadline: '2026-05-17', deadlineLabel: '2026. máj. 17. 23:59',
    description: 'Egy PDF dokumentumban ismertetni kell a végleges algoritmust és az eredményeket. A honlapon a többi mérföldkőtől elkülönítve be kell mutatni a végleges algoritmust és az eredményeket.',
    tasks: [
      { label: 'PDF: végleges algoritmus + eredmények', done: false },
      { label: 'Weboldal: végleges eredmények elkülönítve', done: false },
      { label: 'Élő demó vagy videó bemutató', done: false },
    ],
    content: [
      {
        icon: '🔜', title: 'Tartalom hamarosan', wip: true,
        html: `<p style="color:var(--muted); font-size:.88rem; line-height:1.8;">
          A 3. mérföldkő tartalma — végleges algoritmus és eredmények —
          2026. május 17. előtt kerül ide.
        </p>`
      }
    ]
  }
];

const TEAM = ['Hrotkó Máté', 'Litavecz Máté'];

function render(data) {
  const container = document.getElementById('milestones-container');

  container.innerHTML = META.map(m => {
    const pts  = data.milestones[m.id].points;
    const pct  = Math.round(pts / m.max * 100);

    const tasksHtml = m.tasks.map(t => `
      <div class="task-item">
        <div class="task-dot" style="background:${t.done ? m.color : 'var(--border)'};"></div>
        <span style="font-size:.88rem; color:${t.done ? 'var(--text)' : 'var(--muted)'}; flex:1;">${t.label}</span>
        ${t.done ? `<span style="font-family:'Space Mono',monospace; font-size:.68rem; color:${m.color};">✓ kész</span>` : ''}
      </div>`).join('');

    const contentHtml = m.content.map(c => `
      <div class="content-block">
        <h3>${c.icon} ${c.title} ${c.wip ? '<span class="wip-badge">Folyamatban</span>' : ''}</h3>
        ${c.html}
      </div>`).join('');

    const teamHtml = TEAM.map(name => {
      const note = (data.team[name] && data.team[name][m.id]) || '';
      return `
      <div class="member-card">
        <div style="font-weight:700; margin-bottom:10px;">👤 ${name}</div>
        <div style="font-family:'Space Mono',monospace; font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px;">Hozzájárulás</div>
        ${note
          ? `<p style="font-size:.85rem; line-height:1.75; color:var(--text); font-family:'Space Mono',monospace;">${note}</p>`
          : `<p style="font-size:.82rem; color:var(--muted); font-style:italic; font-family:'Space Mono',monospace;">Még nincs bejegyezve.</p>`
        }
      </div>`;
    }).join('');

    return `
    <div class="milestone-block fade-in">
      <div class="milestone-block-header">
        <span class="m-pill ${m.pill}">${m.label}</span>
        <span style="font-size:1.15rem; font-weight:800;">${m.title}</span>
        <span class="deadline-badge">📅 ${m.deadlineLabel}</span>
        <div class="pts-big" style="color:${m.color};">${pts}<span style="font-size:.82rem; color:var(--muted); font-weight:400;">/${m.max}</span></div>
      </div>

      <div class="bar-bg" style="margin-bottom:18px;">
        <div class="bar-fill" style="width:${pct}%; background:${m.color};"></div>
      </div>

      <p style="color:var(--muted); font-size:.88rem; line-height:1.8; margin-bottom:20px;">${m.description}</p>

      <div class="section-label">// Feladatok</div>
      <div class="content-block" style="padding:14px 18px;">${tasksHtml}</div>

      <div class="section-label">// Tartalom</div>
      ${contentHtml}

      <div class="section-label">// Csapattagok hozzájárulása</div>
      <div style="display:flex; gap:12px; flex-wrap:wrap;">${teamHtml}</div>

      <div class="divider"></div>
    </div>`;
  }).join('');

  // nav score
  let total = 0;
  META.forEach(m => { total += data.milestones[m.id].points; });
  document.getElementById('nav-score').textContent = `${total}/30 pt`;
}

async function init() {
  setActiveNav();
  try {
    const data = await loadData();
    render(data);
  } catch(e) {
    document.getElementById('milestones-container').innerHTML =
      `<div class="card" style="color:var(--accent3); font-family:'Space Mono',monospace; font-size:.85rem;">
        Nem sikerült betölteni a data.json-t. Ellenőrizd hogy a fájl létezik a repóban.
      </div>`;
  }
}

init();
</script>
</body>
</html>
